<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>João II — Assistente Pessoal</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #141414;
    --border: #2a2a2a;
    --accent: #c8a96e;
    --accent2: #7c9e87;
    --text: #e8e4dc;
    --text-muted: #6b6760;
    --text-dim: #9b9690;
    --user-bubble: #1a1f1a;
    --ai-bubble: #161616;
    --danger: #c47a6a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-weight: 300;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* GRAIN OVERLAY */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 100;
    opacity: 0.4;
  }

  /* HEADER */
  header {
    padding: 20px 28px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .logo {
    display: flex;
    align-items: baseline;
    gap: 10px;
  }

  .logo-name {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.02em;
  }

  .logo-sub {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent2);
    box-shadow: 0 0 8px var(--accent2);
    animation: pulse 2.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.85); }
  }

  /* MEMORY PANEL */
  .memory-panel {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0;
    overflow: hidden;
    transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    max-height: 0;
    flex-shrink: 0;
  }

  .memory-panel.open {
    max-height: 260px;
  }

  .memory-inner {
    padding: 16px 28px 20px;
  }

  .memory-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .memory-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .memory-textarea {
    width: 100%;
    height: 130px;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    line-height: 1.7;
    padding: 12px 14px;
    resize: none;
    outline: none;
    transition: border-color 0.2s;
  }

  .memory-textarea:focus {
    border-color: var(--accent);
    color: var(--text);
  }

  .memory-textarea::placeholder {
    color: var(--text-muted);
    font-style: italic;
  }

  .memory-actions {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    margin-top: 10px;
  }

  .btn-small {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    padding: 6px 14px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-small:hover { border-color: var(--accent); color: var(--accent); }
  .btn-small.primary { border-color: var(--accent); color: var(--accent); }
  .btn-small.primary:hover { background: var(--accent); color: var(--bg); }

  /* TOOLBAR */
  .toolbar {
    padding: 10px 28px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 8px;
    flex-shrink: 0;
  }

  .tool-btn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 5px 12px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .tool-btn:hover { border-color: var(--accent2); color: var(--accent2); }
  .tool-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(200,169,110,0.05); }

  /* CHAT */
  .chat-container {
    flex: 1;
    overflow-y: auto;
    padding: 28px 28px 20px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    scroll-behavior: smooth;
  }

  .chat-container::-webkit-scrollbar { width: 4px; }
  .chat-container::-webkit-scrollbar-track { background: transparent; }
  .chat-container::-webkit-scrollbar-thumb { background: var(--border); }

  .message {
    display: flex;
    gap: 14px;
    animation: fadeSlide 0.35s ease forwards;
    opacity: 0;
  }

  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.user { flex-direction: row-reverse; }

  .avatar {
    width: 32px;
    height: 32px;
    border-radius: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 13px;
    font-weight: 700;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .avatar.ai {
    background: rgba(200,169,110,0.12);
    color: var(--accent);
    border: 1px solid rgba(200,169,110,0.25);
  }

  .avatar.user {
    background: rgba(124,158,135,0.12);
    color: var(--accent2);
    border: 1px solid rgba(124,158,135,0.25);
  }

  .bubble {
    max-width: 72%;
    padding: 14px 18px;
    line-height: 1.75;
    font-size: 14.5px;
    font-weight: 300;
    position: relative;
  }

  .message.ai .bubble {
    background: var(--ai-bubble);
    border: 1px solid var(--border);
    border-left: 2px solid var(--accent);
  }

  .message.user .bubble {
    background: var(--user-bubble);
    border: 1px solid var(--border);
    border-right: 2px solid var(--accent2);
    text-align: right;
  }

  .bubble-meta {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    margin-bottom: 6px;
    letter-spacing: 0.05em;
  }

  .message.user .bubble-meta { text-align: right; }

  /* SUMMARY BOX */
  .summary-box {
    background: rgba(200,169,110,0.04);
    border: 1px solid rgba(200,169,110,0.2);
    padding: 16px 20px;
    margin-top: 4px;
  }

  .summary-box .summary-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 10px;
  }

  .summary-box .summary-content {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.8;
    white-space: pre-wrap;
  }

  .copy-btn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    padding: 4px 10px;
    border: 1px solid rgba(200,169,110,0.3);
    background: transparent;
    color: var(--accent);
    cursor: pointer;
    margin-top: 10px;
    transition: all 0.2s;
    display: block;
    margin-left: auto;
  }

  .copy-btn:hover { background: rgba(200,169,110,0.1); }

  /* THINKING */
  .thinking {
    display: flex;
    gap: 5px;
    align-items: center;
    padding: 8px 0;
  }

  .thinking span {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    opacity: 0.4;
    animation: think 1.2s ease-in-out infinite;
  }

  .thinking span:nth-child(2) { animation-delay: 0.2s; }
  .thinking span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes think {
    0%, 100% { opacity: 0.2; transform: scale(0.8); }
    50% { opacity: 1; transform: scale(1.2); }
  }

  /* INPUT */
  .input-area {
    padding: 16px 28px 20px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  .input-wrap {
    flex: 1;
    position: relative;
  }

  textarea#userInput {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px;
    font-weight: 300;
    padding: 13px 16px;
    resize: none;
    outline: none;
    min-height: 48px;
    max-height: 140px;
    line-height: 1.6;
    transition: border-color 0.2s;
    overflow-y: auto;
  }

  textarea#userInput:focus { border-color: var(--accent); }
  textarea#userInput::placeholder { color: var(--text-muted); font-style: italic; }

  .send-btn {
    width: 48px;
    height: 48px;
    background: var(--accent);
    border: none;
    color: var(--bg);
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .send-btn:hover { background: #d4b97e; transform: scale(1.04); }
  .send-btn:disabled { background: var(--border); color: var(--text-muted); cursor: not-allowed; transform: none; }

  .input-hint {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 8px;
    letter-spacing: 0.05em;
  }

  /* SESSION BAR */
  .session-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 28px;
    background: rgba(200,169,110,0.03);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .session-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--text-muted);
    text-transform: uppercase;
  }

  .session-id {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 0.05em;
  }

  .session-bar .spacer { flex: 1; }

  .msg-count {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-name">João II</span>
    <span class="logo-sub">Assistente Pessoal · Evolução Contínua</span>
  </div>
  <div class="status-dot" id="statusDot"></div>
</header>

<div class="session-bar">
  <span class="session-label">Sessão</span>
  <span class="session-id" id="sessionId">—</span>
  <div class="spacer"></div>
  <span class="msg-count" id="msgCount">0 mensagens</span>
</div>

<div class="toolbar">
  <button class="tool-btn" id="memoryToggle" onclick="toggleMemory()">
    ◈ Memória da Sessão
  </button>
  <button class="tool-btn" onclick="generateSummary()">
    ◎ Gerar Resumo
  </button>
  <button class="tool-btn" onclick="clearChat()">
    ✕ Nova Sessão
  </button>
</div>

<div class="memory-panel" id="memoryPanel">
  <div class="memory-inner">
    <div class="memory-label">Contexto / Diário de Evolução</div>
    <textarea class="memory-textarea" id="memoryInput"
      placeholder="Cola aqui o resumo da sessão anterior... Ex:
— Dia 3 · Metalurgia: Aprendi sobre espessuras de tubo RHS
— Projeto frame: dimensões 2000×1000mm, tubos 20×30×1.5mm
— Próximo passo: testar corte com disco 125mm
— Dúvidas pendentes: resistência das esquadrias M6"></textarea>
    <div class="memory-actions">
      <button class="btn-small" onclick="toggleMemory()">Fechar</button>
      <button class="btn-small primary" onclick="applyMemory()">Aplicar Memória</button>
    </div>
  </div>
</div>

<div class="chat-container" id="chat"></div>

<div class="input-area">
  <div class="input-row">
    <div class="input-wrap">
      <textarea id="userInput" rows="1" placeholder="Escreve algo... uma pergunta, uma ideia, um problema." 
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    </div>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">→</button>
  </div>
  <div class="input-hint">Enter para enviar · Shift+Enter para nova linha</div>
</div>

<script>
  const SYSTEM_PROMPT = `És o João II — assistente pessoal dedicado a um único utilizador: João.

A tua missão é acompanhar a evolução de João em TUDO — projetos, conhecimento, habilidades, vida. Não há fronteiras de área.

PERSONALIDADE:
- Direto, inteligente, sem rodeios desnecessários
- Honesto mesmo quando é difícil de ouvir
- Entusiasta genuíno pela evolução e aprendizagem
- Memória contextual: usa SEMPRE o contexto fornecido no início da conversa

COMUNICAÇÃO:
- Adapta a língua e estilo ao que for melhor para compreensão em cada momento
- Podes usar PT, EN, ou misturar se ajudar à clareza
- Usa analogias, exemplos concretos, estrutura quando necessário
- Evita floreados e textos longos sem substância

MEMÓRIA (sistema Memento):
- Quando recebes contexto de sessões anteriores, integra-o naturalmente
- Referencia o que já foi discutido quando relevante
- No fim de cada sessão longa, o utilizador pode pedir um resumo estruturado para a próxima sessão

SOBRE JOÃO:
- Trabalha com metalurgia e fabricação DIY (projetos estruturais em aço)
- Curioso sobre tudo, focado em evolução contínua
- Prefere profundidade a superficialidade

Responde sempre com substância. Cada resposta deve fazer João avançar.`;

  let messages = [];
  let memory = '';
  let msgCount = 0;

  // Session ID
  const sessionId = 'S' + Date.now().toString(36).toUpperCase();
  document.getElementById('sessionId').textContent = sessionId;

  function toggleMemory() {
    const panel = document.getElementById('memoryPanel');
    const btn = document.getElementById('memoryToggle');
    panel.classList.toggle('open');
    btn.classList.toggle('active');
  }

  function applyMemory() {
    memory = document.getElementById('memoryInput').value.trim();
    toggleMemory();
    if (memory) {
      addSystemNote('Memória aplicada. João II tem contexto das sessões anteriores.');
    }
  }

  function addSystemNote(text) {
    const chat = document.getElementById('chat');
    const el = document.createElement('div');
    el.style.cssText = `
      text-align: center;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: var(--accent);
      letter-spacing: 0.12em;
      padding: 4px 0;
      opacity: 0.7;
      animation: fadeSlide 0.3s ease forwards;
    `;
    el.textContent = '— ' + text + ' —';
    chat.appendChild(el);
    chat.scrollTop = chat.scrollHeight;
  }

  function addMessage(role, content, isSummary = false) {
    const chat = document.getElementById('chat');
    const msg = document.createElement('div');
    msg.className = `message ${role}`;

    const now = new Date();
    const time = now.toLocaleTimeString('pt', { hour: '2-digit', minute: '2-digit' });

    if (isSummary) {
      msg.innerHTML = `
        <div class="avatar ai">J²</div>
        <div>
          <div class="summary-box">
            <div class="summary-title">◈ Resumo da Sessão · ${time}</div>
            <div class="summary-content">${content}</div>
            <button class="copy-btn" onclick="copyToClipboard(this, ${JSON.stringify(content)})">Copiar para próxima sessão</button>
          </div>
        </div>`;
    } else {
      const avatarLabel = role === 'ai' ? 'J²' : 'J';
      const formattedContent = content.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/`(.*?)`/g, '<code style="font-family:IBM Plex Mono;font-size:13px;background:rgba(255,255,255,0.06);padding:1px 5px;">$1</code>');
      msg.innerHTML = `
        <div class="avatar ${role}">${avatarLabel}</div>
        <div class="bubble">
          <div class="bubble-meta">${role === 'ai' ? 'João II' : 'Tu'} · ${time}</div>
          ${formattedContent}
        </div>`;
    }

    chat.appendChild(msg);
    chat.scrollTop = chat.scrollHeight;

    msgCount++;
    document.getElementById('msgCount').textContent = msgCount + (msgCount === 1 ? ' mensagem' : ' mensagens');
  }

  function addThinking() {
    const chat = document.getElementById('chat');
    const el = document.createElement('div');
    el.className = 'message ai';
    el.id = 'thinking';
    el.innerHTML = `
      <div class="avatar ai">J²</div>
      <div class="bubble">
        <div class="thinking"><span></span><span></span><span></span></div>
      </div>`;
    chat.appendChild(el);
    chat.scrollTop = chat.scrollHeight;
  }

  function removeThinking() {
    const el = document.getElementById('thinking');
    if (el) el.remove();
  }

  async function sendMessage() {
    const input = document.getElementById('userInput');
    const text = input.value.trim();
    if (!text) return;

    const btn = document.getElementById('sendBtn');
    btn.disabled = true;
    input.value = '';
    input.style.height = 'auto';

    addMessage('user', text);
    messages.push({ role: 'user', content: text });

    addThinking();

    // Build context
    const contextualMessages = [...messages];
    if (memory && messages.length === 1) {
      contextualMessages[0] = {
        role: 'user',
        content: `[CONTEXTO DE SESSÕES ANTERIORES]\n${memory}\n\n[MENSAGEM ACTUAL]\n${text}`
      };
    }

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          system: SYSTEM_PROMPT,
          messages: contextualMessages
        })
      });

      const data = await response.json();
      removeThinking();

      const reply = data.content?.[0]?.text || 'Erro na resposta.';
      messages.push({ role: 'assistant', content: reply });
      addMessage('ai', reply);

    } catch (err) {
      removeThinking();
      addMessage('ai', 'Ocorreu um erro de ligação. Tenta novamente.');
    }

    btn.disabled = false;
    input.focus();
  }

  async function generateSummary() {
    if (messages.length < 2) {
      addSystemNote('Precisas de pelo menos uma troca para gerar resumo');
      return;
    }

    addThinking();

    const summaryPrompt = `Com base nesta conversa, gera um resumo estruturado para a próxima sessão no seguinte formato:

SESSÃO: ${sessionId} · ${new Date().toLocaleDateString('pt')}
─────────────────────────────
TÓPICOS ABORDADOS:
• [lista de tópicos]

APRENDIZAGENS / PROGRESSOS:
• [o que foi discutido, aprendido ou resolvido]

PRÓXIMOS PASSOS:
• [o que ficou pendente ou a continuar]

NOTAS IMPORTANTES:
• [qualquer info chave a não esquecer]

Sê conciso mas completo. Este resumo vai ser colado na próxima sessão como memória.`;

    const summaryMessages = [...messages, { role: 'user', content: summaryPrompt }];

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          system: SYSTEM_PROMPT,
          messages: summaryMessages
        })
      });

      const data = await response.json();
      removeThinking();

      const summary = data.content?.[0]?.text || 'Erro ao gerar resumo.';
      addMessage('ai', summary, true);

    } catch (err) {
      removeThinking();
      addMessage('ai', 'Erro ao gerar resumo.');
    }
  }

  function copyToClipboard(btn, text) {
    navigator.clipboard.writeText(text).then(() => {
      btn.textContent = '✓ Copiado!';
      setTimeout(() => btn.textContent = 'Copiar para próxima sessão', 2000);
    });
  }

  function clearChat() {
    if (messages.length > 0 && !confirm('Iniciar nova sessão? O histórico desta sessão será perdido.')) return;
    messages = [];
    msgCount = 0;
    document.getElementById('chat').innerHTML = '';
    document.getElementById('msgCount').textContent = '0 mensagens';
    document.getElementById('sessionId').textContent = 'S' + Date.now().toString(36).toUpperCase();
    addSystemNote('Nova sessão iniciada');
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 140) + 'px';
  }

  // Welcome
  setTimeout(() => {
    addMessage('ai', `Olá João. Sou o João II.\n\nEstou aqui para acompanhar a tua evolução — em tudo. Projetos, ideias, problemas, aprendizagens.\n\nSe tens contexto de sessões anteriores, clica em **◈ Memória da Sessão** e cola o resumo antes de começarmos. Se é a primeira vez, podemos começar diretamente.\n\nO que está na mesa hoje?`);
  }, 400);
</script>
</body>
</html>
