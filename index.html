<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="João II">
<title>João II</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { background:#0d0d0d; color:#e8e4dc; font-family:Georgia,serif; height:100vh; overflow:hidden; }

#setup {
  position:fixed; inset:0; background:#0d0d0d;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:40px 28px; gap:16px;
}
#setup h1 { font-size:52px; color:#c8a96e; font-style:italic; }
#setup p { font-size:12px; color:#666; letter-spacing:0.1em; text-transform:uppercase; margin-top:-8px; }
#setup label { font-size:11px; color:#c8a96e; letter-spacing:0.1em; text-transform:uppercase; align-self:flex-start; width:100%; max-width:340px; }
#setup input {
  width:100%; max-width:340px; background:#111; border:1px solid #333;
  color:#e8e4dc; font-family:monospace; font-size:13px; padding:14px;
  outline:none; border-radius:0; -webkit-appearance:none;
}
#setup input:focus { border-color:#c8a96e; }
#setup button {
  width:100%; max-width:340px; background:#c8a96e; border:none;
  color:#0d0d0d; font-size:13px; letter-spacing:0.1em; padding:16px;
  cursor:pointer; border-radius:0; -webkit-appearance:none; text-transform:uppercase;
}
#setup small { font-size:10px; color:#444; text-align:center; line-height:1.6; max-width:300px; }
#err { color:#c47a6a; font-size:12px; display:none; }

#app { display:none; flex-direction:column; height:100vh; }

header {
  padding:14px 18px; border-bottom:1px solid #222;
  display:flex; align-items:center; justify-content:space-between; flex-shrink:0;
}
.logo-name { font-style:italic; font-size:22px; color:#c8a96e; }
.logo-sub { font-size:9px; color:#555; letter-spacing:0.12em; text-transform:uppercase; font-family:monospace; }
.dot { width:7px; height:7px; border-radius:50%; background:#7c9e87; box-shadow:0 0 8px #7c9e87; animation:p 2.5s infinite; }
@keyframes p { 0%,100%{opacity:1} 50%{opacity:0.2} }

.bar {
  padding:8px 18px; border-bottom:1px solid #1a1a1a;
  display:flex; gap:6px; background:#0f0f0f; flex-shrink:0;
}
.tbtn {
  font-family:monospace; font-size:9px; letter-spacing:0.08em; text-transform:uppercase;
  padding:5px 10px; border:1px solid #222; background:transparent; color:#666;
  cursor:pointer; border-radius:0; -webkit-appearance:none;
}
.tbtn.on { border-color:#c8a96e; color:#c8a96e; }

#mempanel {
  overflow:hidden; max-height:0; transition:max-height 0.3s ease;
  background:#111; border-bottom:1px solid #1a1a1a; flex-shrink:0;
}
.meminside { padding:14px 18px 16px; }
.memlabel { font-family:monospace; font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:#c8a96e; margin-bottom:8px; }
#memtext {
  width:100%; height:100px; background:#0d0d0d; border:1px solid #222; color:#aaa;
  font-family:monospace; font-size:12px; line-height:1.7; padding:10px; resize:none; outline:none;
  border-radius:0; -webkit-appearance:none;
}
#memtext:focus { border-color:#c8a96e; }
.membtns { display:flex; justify-content:flex-end; gap:8px; margin-top:8px; }
.mbtn { font-family:monospace; font-size:11px; padding:7px 14px; border:1px solid #333; background:transparent; color:#888; cursor:pointer; border-radius:0; }
.mbtn.ok { border-color:#c8a96e; color:#c8a96e; }

#chat {
  flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch;
  padding:18px; display:flex; flex-direction:column; gap:14px;
}
.msg { display:flex; gap:10px; }
.msg.u { flex-direction:row-reverse; }
.av {
  width:28px; height:28px; border-radius:2px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-style:italic; font-size:11px; font-weight:bold; margin-top:2px;
}
.av.ai { background:rgba(200,169,110,0.1); color:#c8a96e; border:1px solid rgba(200,169,110,0.2); }
.av.u { background:rgba(124,158,135,0.1); color:#7c9e87; border:1px solid rgba(124,158,135,0.2); }
.bub { max-width:80%; padding:11px 14px; font-size:15px; font-weight:300; line-height:1.8; }
.msg:not(.u) .bub { background:#141414; border:1px solid #1e1e1e; border-left:2px solid #c8a96e; }
.msg.u .bub { background:#111; border:1px solid #1e1e1e; border-right:2px solid #7c9e87; text-align:right; }
.meta { font-family:monospace; font-size:10px; color:#444; margin-bottom:5px; }
.msg.u .meta { text-align:right; }
.dots { display:flex; gap:5px; align-items:center; padding:4px 0; }
.dots span { width:6px; height:6px; border-radius:50%; background:#c8a96e; opacity:0.3; animation:th 1.2s infinite; }
.dots span:nth-child(2){animation-delay:.2s} .dots span:nth-child(3){animation-delay:.4s}
@keyframes th { 0%,100%{opacity:0.2;transform:scale(0.8)} 50%{opacity:1;transform:scale(1.3)} }
.note { text-align:center; font-family:monospace; font-size:10px; color:#c8a96e; opacity:0.6; }
.sumbox { border:1px solid rgba(200,169,110,0.2); padding:14px; flex:1; }
.sumtitle { font-family:monospace; font-size:10px; text-transform:uppercase; color:#c8a96e; margin-bottom:8px; letter-spacing:0.1em; }
.sumtext { font-family:monospace; font-size:12px; color:#999; line-height:1.8; white-space:pre-wrap; }
.copybtn { font-family:monospace; font-size:10px; padding:4px 10px; border:1px solid rgba(200,169,110,0.3); background:transparent; color:#c8a96e; cursor:pointer; margin-top:10px; display:block; margin-left:auto; }

.inputarea {
  padding:12px 18px 20px; border-top:1px solid #1a1a1a; flex-shrink:0; background:#0d0d0d;
}
.inputrow { display:flex; gap:8px; align-items:flex-end; }
#inp {
  flex:1; background:#111; border:1px solid #222; color:#e8e4dc;
  font-family:Georgia,serif; font-size:16px; padding:12px 14px;
  resize:none; outline:none; min-height:46px; max-height:110px; line-height:1.5;
  border-radius:0; -webkit-appearance:none;
}
#inp:focus { border-color:#c8a96e; }
#inp::placeholder { color:#444; font-style:italic; }
#sendbtn {
  width:46px; height:46px; background:#c8a96e; border:none; color:#0d0d0d;
  font-size:22px; cursor:pointer; flex-shrink:0; border-radius:0; -webkit-appearance:none;
  display:flex; align-items:center; justify-content:center;
}
#sendbtn:disabled { background:#222; color:#444; }
</style>
</head>
<body>

<div id="setup">
  <h1>J²</h1>
  <p>Assistente Pessoal</p>
  <label>API Key Anthropic</label>
  <input type="password" id="keyinput" placeholder="sk-ant-..." autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false">
  <div id="err">Key inválida. Deve começar com sk-ant-</div>
  <button onclick="start()">Entrar →</button>
  <small>A key é guardada no teu dispositivo e usada apenas para comunicar com a API da Anthropic.</small>
</div>

<div id="app">
  <header>
    <div>
      <div class="logo-name">João II</div>
      <div class="logo-sub">Evolução Contínua</div>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <div class="dot"></div>
      <button class="tbtn" onclick="resetKey()" style="font-size:14px;padding:4px 8px">⚙</button>
    </div>
  </header>

  <div class="bar">
    <button class="tbtn" id="membtn" onclick="toggleMem()">◈ Memória</button>
    <button class="tbtn" onclick="doSummary()">◎ Resumo</button>
    <button class="tbtn" onclick="newSession()">✕ Nova</button>
  </div>

  <div id="mempanel">
    <div class="meminside">
      <div class="memlabel">Diário de Evolução</div>
      <textarea id="memtext" placeholder="Cola o resumo da sessão anterior...
Ex: — Frame 2000×1000mm, RHS 20×30×1.5mm
— Próximo: testar corte disco 125mm"></textarea>
      <div class="membtns">
        <button class="mbtn" onclick="toggleMem()">Fechar</button>
        <button class="mbtn ok" onclick="applyMem()">Aplicar</button>
      </div>
    </div>
  </div>

  <div id="chat"></div>

  <div class="inputarea">
    <div class="inputrow">
      <textarea id="inp" rows="1" placeholder="Uma pergunta, ideia ou problema..."
        oninput="resize(this)" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"></textarea>
      <button id="sendbtn" onclick="send()">→</button>
    </div>
  </div>
</div>

<script>
const SYS = `És o João II — assistente pessoal dedicado exclusivamente a João.
Acompanhas a evolução de João em TUDO — projetos, conhecimento, habilidades, vida.
Direto, inteligente, honesto. Adaptas a língua ao que for melhor para compreensão (PT/EN).
Nunca partilhas dados de João com terceiros. Cada resposta faz João avançar.
João trabalha com metalurgia e fabricação DIY. Curioso, prefere profundidade.`;

let key='', msgs=[], memory='', busy=false, memOpen=false;

window.onload=()=>{
  const k=localStorage.getItem('j2key');
  if(k){key=k;go();}
};

function start(){
  const k=document.getElementById('keyinput').value.trim();
  const e=document.getElementById('err');
  if(!k.startsWith('sk-ant-')){e.style.display='block';return;}
  e.style.display='none';
  key=k;
  try{localStorage.setItem('j2key',k);}catch(x){}
  go();
}

function go(){
  document.getElementById('setup').style.display='none';
  document.getElementById('app').style.display='flex';
  addAI('Olá João. Sou o João II.\n\nEstou aqui para acompanhar a tua evolução — em tudo.\n\nSe tens contexto de sessões anteriores, clica em **◈ Memória**.\n\nO que está na mesa hoje?');
}

function resetKey(){
  if(confirm('Mudar API Key?')){localStorage.removeItem('j2key');location.reload();}
}

function toggleMem(){
  memOpen=!memOpen;
  document.getElementById('mempanel').style.maxHeight=memOpen?'230px':'0';
  document.getElementById('membtn').classList.toggle('on',memOpen);
}

function applyMem(){
  memory=document.getElementById('memtext').value.trim();
  toggleMem();
  if(memory) note('Memória aplicada.');
}

function newSession(){
  if(msgs.length<2||confirm('Nova sessão?')){
    msgs=[];memory='';
    document.getElementById('chat').innerHTML='';
    addAI('Nova sessão. O que está na mesa hoje?');
  }
}

function note(t){
  const d=document.createElement('div');
  d.className='note';d.textContent='— '+t+' —';
  document.getElementById('chat').appendChild(d);
  scroll();
}

function fmt(t){
  return t.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
          .replace(/`(.*?)`/g,'<code style="font-family:monospace;font-size:12px;background:#1a1a1a;padding:1px 4px">$1</code>')
          .replace(/\n/g,'<br>');
}

function addAI(txt){
  const t=new Date().toLocaleTimeString('pt',{hour:'2-digit',minute:'2-digit'});
  const d=document.createElement('div');
  d.className='msg';
  d.innerHTML=`<div class="av ai">J²</div><div class="bub"><div class="meta">João II · ${t}</div><div>${fmt(txt)}</div></div>`;
  document.getElementById('chat').appendChild(d);
  scroll();
}

function addUser(txt){
  const t=new Date().toLocaleTimeString('pt',{hour:'2-digit',minute:'2-digit'});
  const d=document.createElement('div');
  d.className='msg u';
  d.innerHTML=`<div class="av u">J</div><div class="bub"><div class="meta">${t}</div><div>${fmt(txt)}</div></div>`;
  document.getElementById('chat').appendChild(d);
  scroll();
}

function showThinking(){
  const d=document.createElement('div');
  d.className='msg';d.id='th';
  d.innerHTML=`<div class="av ai">J²</div><div class="bub"><div class="dots"><span></span><span></span><span></span></div></div>`;
  document.getElementById('chat').appendChild(d);
  scroll();
}

function hideThinking(){document.getElementById('th')?.remove();}
function scroll(){setTimeout(()=>{const c=document.getElementById('chat');c.scrollTop=c.scrollHeight;},50);}

function resize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,110)+'px';}

async function call(messages){
  const r=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'x-api-key':key,
      'anthropic-version':'2023-06-01',
      'anthropic-dangerous-direct-browser-access':'true',
    },
    body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:1024,system:SYS,messages})
  });
  const d=await r.json();
  if(!r.ok) throw new Error(d.error?.message||'Erro '+r.status);
  return d.content?.[0]?.text||'';
}

async function send(){
  const el=document.getElementById('inp');
  const txt=el.value.trim();
  if(!txt||busy) return;
  busy=true;
  document.getElementById('sendbtn').disabled=true;
  el.value='';el.style.height='auto';

  addUser(txt);
  msgs.push({role:'user',content:txt});
  showThinking();

  const apiMsgs=msgs.map((m,i)=>{
    if(m.role==='user'&&i===0&&memory)
      return{role:'user',content:`[CONTEXTO ANTERIOR]\n${memory}\n\n[MENSAGEM]\n${m.content}`};
    return{role:m.role==='ai'?'assistant':'user',content:m.content};
  });

  try{
    const rep=await call(apiMsgs);
    hideThinking();
    msgs.push({role:'ai',content:rep});
    addAI(rep);
  }catch(e){
    hideThinking();
    addAI('Erro: '+e.message);
  }

  busy=false;
  document.getElementById('sendbtn').disabled=false;
}

async function doSummary(){
  const c=msgs.filter(m=>m.role==='ai'||m.role==='user');
  if(c.length<2){note('Precisas de pelo menos uma troca.');return;}
  busy=true; showThinking();
  const today=new Date().toLocaleDateString('pt');
  const am=[...c.map(m=>({role:m.role==='ai'?'assistant':'user',content:m.content})),
    {role:'user',content:`Gera um resumo estruturado:\n\nSESSÃO: ${today}\n─────────────────\nTÓPICOS:\n• [lista]\n\nPROGRESSOS:\n• [o que foi discutido]\n\nPRÓXIMOS PASSOS:\n• [pendentes]\n\nNOTAS:\n• [info chave]`}];
  try{
    const s=await call(am);
    hideThinking();
    const t=new Date().toLocaleTimeString('pt',{hour:'2-digit',minute:'2-digit'});
    const d=document.createElement('div');
    d.style.display='flex';d.style.gap='10px';
    d.innerHTML=`<div class="av ai">J²</div><div class="sumbox"><div class="sumtitle">◈ Resumo · ${t}</div><div class="sumtext">${s.replace(/</g,'&lt;')}</div><button class="copybtn" onclick="cp(this,${JSON.stringify(s)})">Copiar para próxima sessão</button></div>`;
    document.getElementById('chat').appendChild(d);
    scroll();
  }catch(e){note('Erro: '+e.message);}
  busy=false;
}

function cp(btn,txt){
  navigator.clipboard.writeText(txt).then(()=>{
    btn.textContent='✓ Copiado!';
    setTimeout(()=>btn.textContent='Copiar para próxima sessão',2000);
  });
}
</script>
</body>
</html>
